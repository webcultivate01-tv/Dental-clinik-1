<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Service Details – SmileCare Dental Clinic</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
  :root {
    --teal-dark:#0d6e6e; --teal-mid:#0e8585; --teal-light:#12a0a0;
    --teal-pale:#e0f5f5; --teal-xpale:#f0fafa; --accent:#f4a024;
    --text-dark:#1a2e2e; --text-mid:#3d5a5a;
  }
  * { scroll-behavior:smooth; box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Nunito',sans-serif; color:var(--text-dark); background:#fff; overflow-x:hidden; }
  h1,h2,h3 { font-family:'Playfair Display',serif; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:var(--teal-xpale); }
  ::-webkit-scrollbar-thumb { background:var(--teal-mid); border-radius:10px; }

  /* ── Topbar ── */
  .topbar { background:var(--teal-dark); color:rgba(255,255,255,0.9); font-size:13px; font-weight:600; padding:7px 0; }

  /* ── Navbar ── */
  .navbar { background:#fff; box-shadow:0 2px 20px rgba(13,110,110,0.10); position:sticky; top:0; z-index:100; }
  .nav-link { color:var(--text-mid); font-weight:600; font-size:15px; padding:6px 4px; border-radius:0; transition:color 0.2s; text-decoration:none; position:relative; }
  .nav-link::after { content:''; position:absolute; bottom:-2px; left:0; width:0; height:2px; background:var(--teal-dark); border-radius:2px; transition:width 0.25s; }
  .nav-link:hover { color:var(--teal-dark); background:transparent; }
  .nav-link:hover::after { width:100%; }
  .nav-link.active { color:var(--teal-dark); background:transparent; }
  .nav-link.active::after { width:100%; }
  .btn-primary { background:var(--teal-dark); color:#fff; font-weight:700; padding:10px 26px; border-radius:50px; transition:all 0.2s; font-size:14px; border:none; cursor:pointer; text-decoration:none; display:inline-block; }
  .btn-primary:hover { background:var(--teal-light); transform:translateY(-1px); box-shadow:0 6px 20px rgba(13,110,110,0.25); }
  .section-tag { display:inline-block; background:var(--teal-pale); color:var(--teal-dark); font-size:12px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; padding:5px 14px; border-radius:50px; margin-bottom:12px; }
  .section-title { font-size:clamp(28px,4vw,38px); color:var(--text-dark); line-height:1.25; }
  .mobile-menu { display:none; }
  .mobile-menu.open { display:block; }

  /* ══════════════════════════════════
     HERO SECTION
  ══════════════════════════════════ */
  .hero {
    position:relative;
    min-height:88vh;
    display:flex;
    align-items:center;
    overflow:hidden;
  }
  .hero-bg {
    position:absolute; inset:0;
    background-image:url('https://images.unsplash.com/photo-1588776814546-1ffedfe47d38?w=1600&q=80');
    background-size:cover;
    background-position:center 30%;
    transform:scale(1.05);
    animation:heroZoom 12s ease-out forwards;
  }
  @keyframes heroZoom {
    from { transform:scale(1.05); }
    to   { transform:scale(1.0); }
  }
  .hero-overlay {
    position:absolute; inset:0;
    background:linear-gradient(110deg, rgba(6,50,50,0.85) 0%, rgba(6,50,50,0.55) 60%, rgba(6,50,50,0.1) 100%);
  }
  .hero-content {
    position:relative;
    z-index:2;
    max-width:1200px;
    margin:0 auto;
    padding:80px 40px;
    width:100%;
  }
  .hero-badge {
    display:inline-flex; align-items:center; gap:8px;
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.25);
    backdrop-filter:blur(8px);
    color:#fff; font-size:12px; font-weight:700;
    letter-spacing:1.5px; text-transform:uppercase;
    padding:7px 18px; border-radius:50px;
    margin-bottom:28px;
    opacity:0; animation:fadeUp 0.7s 0.3s ease forwards;
  }
  .hero-title {
    color:#fff;
    font-size:clamp(36px,6vw,68px);
    line-height:1.1;
    max-width:680px;
    margin-bottom:24px;
    opacity:0; animation:fadeUp 0.7s 0.5s ease forwards;
  }
  .hero-title em { color:#7de8e8; font-style:italic; }
  .hero-sub {
    color:rgba(255,255,255,0.75);
    font-size:17px; line-height:1.7; max-width:500px;
    margin-bottom:36px;
    opacity:0; animation:fadeUp 0.7s 0.7s ease forwards;
  }
  .hero-btns {
    display:flex; flex-wrap:wrap; gap:14px;
    opacity:0; animation:fadeUp 0.7s 0.9s ease forwards;
  }
  .hero-btn-white {
    background:#fff; color:var(--teal-dark); font-weight:700;
    padding:13px 30px; border-radius:50px; font-size:15px;
    text-decoration:none; transition:all 0.2s;
    box-shadow:0 4px 20px rgba(0,0,0,0.15);
  }
  .hero-btn-white:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(0,0,0,0.2); }
  .hero-btn-outline {
    background:transparent; color:#fff; font-weight:700;
    padding:13px 30px; border-radius:50px; font-size:15px;
    text-decoration:none; border:2px solid rgba(255,255,255,0.5);
    transition:all 0.2s;
  }
  .hero-btn-outline:hover { background:rgba(255,255,255,0.1); border-color:#fff; }

  /* floating stat cards */
  .hero-stats {
    position:absolute; bottom:40px; right:40px; z-index:3;
    display:flex; gap:16px; flex-wrap:wrap; justify-content:flex-end;
    opacity:0; animation:fadeUp 0.7s 1.1s ease forwards;
  }
  .stat-card {
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.22);
    backdrop-filter:blur(12px);
    border-radius:18px; padding:18px 24px;
    text-align:center; color:#fff; min-width:110px;
  }
  .stat-card .num { font-size:30px; font-weight:800; font-family:'Playfair Display',serif; color:#7de8e8; line-height:1; }
  .stat-card .lbl { font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; opacity:0.75; margin-top:4px; }

  /* scroll indicator */
  .scroll-hint {
    position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
    z-index:3; display:flex; flex-direction:column; align-items:center; gap:6px;
    color:rgba(255,255,255,0.5); font-size:11px; letter-spacing:1px; text-transform:uppercase;
    animation:bounce 2.5s infinite;
  }
  .scroll-hint svg { width:18px; opacity:0.5; }
  @keyframes bounce { 0%,100%{transform:translateX(-50%) translateY(0);} 50%{transform:translateX(-50%) translateY(6px);} }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(24px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* ══════════════════════════════════
     STATS STRIP
  ══════════════════════════════════ */
  .stats-strip {
    background:var(--teal-dark);
    padding:40px 20px;
  }
  .stats-inner {
    max-width:1100px; margin:0 auto;
    display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:24px; text-align:center;
  }
  .strip-stat .big { font-size:42px; font-weight:800; color:#fff; font-family:'Playfair Display',serif; }
  .strip-stat .label { font-size:13px; color:rgba(255,255,255,0.65); font-weight:600; letter-spacing:0.5px; margin-top:4px; }
  .strip-stat .accent { color:#7de8e8; }
